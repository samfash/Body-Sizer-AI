version: '3.8'
services:
  app:
    build: ..
    container_name: body_api
    ports:
      - "8001:8001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    volumes:
      - ../model:/app/model
    depends_on:
      - mlflow

  mlflow:
    image: python:3.10-slim
    container_name: mlflow
    command: bash -lc "pip install mlflow && mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlruns --host 0.0.0.0 --port 5001"
    ports:
      - "5001:5001"
    volumes:
      - ../mlruns:/mlruns
      - ../mlflow.db:/mlflow.db
